<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%">
  <defs>
    <!-- Filtro de resplandor para simular el gas de neón -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bg { fill: #0b0e14; }
      
      .grid {
        stroke: rgba(129, 140, 248, 0.08); /* Color accent de searXena */
        stroke-width: 1;
      }

      /* Tubo de cristal central (Luz intensa) */
      .neon-tube {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 75px;
        font-weight: 700;
        fill: none;
        stroke: #f1f5f9;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        letter-spacing: 8px;
        animation: neon-flicker 5s infinite alternate;
      }

      /* Halo exterior morado brillante (Resplandor) */
      .neon-halo {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 75px;
        font-weight: 700;
        fill: none;
        stroke: #c084fc;
        stroke-width: 14;
        filter: url(#neonGlow);
        letter-spacing: 8px;
        animation: neon-flicker 5s infinite alternate;
      }
      
      /* Subtítulo estilo terminal limpio */
      .terminal-sub {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 18px;
        fill: #818cf8;
        letter-spacing: 12px;
      }

      /* Animación de defecto clásico de un letrero de neón viejo */
      @keyframes neon-flicker {
        0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.3; }
      }
      
      /* Efecto visual de CRT / Escaneo */
      .scanline {
        fill: rgba(129, 140, 248, 0.03);
        animation: scan 6s linear infinite;
      }
      
      @keyframes scan {
        0% { transform: translateY(-250px); }
        100% { transform: translateY(250px); }
      }
    </style>
  </defs>

  <!-- Fondo Dark Mode Base -->
  <rect width="100%" height="100%" class="bg" rx="15" />
  
  <!-- Patrón de Cuadrícula Tecnológica -->
  <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" class="grid" />
  </pattern>
  <rect width="100%" height="100%" fill="url(#gridPattern)" rx="15" />

  <!-- Línea de escaneo móvil -->
  <rect width="100%" height="30" class="scanline" />

  <!-- Capa 1: Resplandor Morado -->
  <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" class="neon-halo">NEURAL_ARCH_LABS</text>
  
  <!-- Capa 2: Tubo Blanco/Eléctrico Brillante -->
  <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" class="neon-tube">NEURAL_ARCH_LABS</text>
  
  <!-- Subtítulo inferior -->
  <text x="50%" y="78%" text-anchor="middle" dominant-baseline="middle" class="terminal-sub">PRIVATE_INFRASTRUCTURE_LAB</text>
</svg>
